<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="heartGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="30%" stop-color="#F57C00"/>
      <stop offset="60%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F57C00"/>
      <stop offset="50%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#E91E63" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Pure white background -->
  <rect width="1024" height="1024" fill="#FFFFFF"/>
  <!-- Subtle rounded rect for app icon safe zone -->
  <rect x="16" y="16" width="992" height="992" rx="200" ry="200" fill="none" stroke="#F5F5F5" stroke-width="2"/>

  <!-- Ethiopian cross pattern — subtle, behind heart -->
  <g opacity="0.06" fill="none" stroke="#D84315" stroke-width="1">
    <g transform="translate(512,390)">
      <path d="M0,-100 L6,-108 L12,-100 L6,-92 Z"/>
      <path d="M0,-100 L-6,-108 L-12,-100 L-6,-92 Z"/>
      <path d="M0,100 L6,108 L12,100 L6,92 Z"/>
      <path d="M0,100 L-6,108 L-12,100 L-6,92 Z"/>
      <path d="M-100,0 L-108,6 L-100,12 L-92,6 Z"/>
      <path d="M-100,0 L-108,-6 L-100,-12 L-92,-6 Z"/>
      <path d="M100,0 L108,6 L100,12 L92,6 Z"/>
      <path d="M100,0 L108,-6 L100,-12 L92,-6 Z"/>
      <path d="M-24,-36 L0,-100 L24,-36"/>
      <path d="M-24,36 L0,100 L24,36"/>
      <path d="M-36,-24 L-100,0 L-36,24"/>
      <path d="M36,-24 L100,0 L36,24"/>
      <path d="M-74,-74 L-100,-100"/>
      <path d="M74,-74 L100,-100"/>
      <path d="M-74,74 L-100,100"/>
      <path d="M74,74 L100,100"/>
      <circle cx="0" cy="0" r="48" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="84" stroke-width="0.6"/>
    </g>
  </g>

  <!-- Diamond weave pattern — subtle border accent -->
  <g opacity="0.05" fill="none" stroke="#C62828" stroke-width="1">
    <g transform="translate(512,512)">
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(0)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(30)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(60)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(90)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(120)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(150)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(180)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(210)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(240)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(270)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(300)"/>
      <path d="M0,-420 L10,-434 L0,-448 L-10,-434 Z" transform="rotate(330)"/>
    </g>
  </g>

  <!-- MAIN HEART — warm gradient, clean shape -->
  <g filter="url(#softShadow)" transform="translate(512,370)">
    <path d="M0,180 C-250,-20 -410,-190 -310,-320 C-240,-410 -120,-410 -50,-320 C0,-240 0,-110 0,-110 C0,-110 0,-240 50,-320 C120,-410 240,-410 310,-320 C410,-190 250,-20 0,180 Z"
      fill="url(#heartGrad)"/>

    <!-- Ethiopian cross lattice inside heart — subtle white -->
    <g opacity="0.10" fill="none" stroke="#FFFFFF" stroke-width="1.2">
      <path d="M0,-100 L10,-110 L20,-100 L10,-90 Z"/>
      <path d="M0,-100 L-10,-110 L-20,-100 L-10,-90 Z"/>
      <path d="M0,100 L10,110 L20,100 L10,90 Z"/>
      <path d="M0,100 L-10,110 L-20,100 L-10,90 Z"/>
      <path d="M-100,0 L-110,10 L-100,20 L-90,10 Z"/>
      <path d="M-100,0 L-110,-10 L-100,-20 L-90,-10 Z"/>
      <path d="M100,0 L110,10 L100,20 L90,10 Z"/>
      <path d="M100,0 L110,-10 L100,-20 L90,-10 Z"/>
      <path d="M-26,-44 L0,-100 L26,-44"/>
      <path d="M-26,44 L0,100 L26,44"/>
      <path d="M-44,-26 L-100,0 L-44,26"/>
      <path d="M44,-26 L100,0 L44,26"/>
      <path d="M-76,-76 L-100,-100"/>
      <path d="M76,-76 L100,-100"/>
      <path d="M-76,76 L-100,100"/>
      <path d="M76,76 L100,100"/>
      <circle cx="0" cy="0" r="48"/>
      <circle cx="0" cy="0" r="84"/>
    </g>

    <!-- Soft highlight on upper lobes -->
    <ellipse cx="-95" cy="-120" rx="80" ry="110" fill="white" opacity="0.06" transform="rotate(-15,-95,-120)"/>
    <ellipse cx="95" cy="-120" rx="80" ry="110" fill="white" opacity="0.06" transform="rotate(15,95,-120)"/>
  </g>

  <!-- "Kalkidan" — love letter cursive script -->
  <text x="512" y="840" text-anchor="middle"
    font-family="'Dancing Script','Great Vibes','Pacifico','Brush Script MT','Snell Roundhand',cursive"
    font-weight="700" font-size="110"
    fill="url(#textGrad)"
    font-style="italic"
    letter-spacing="6">
    Kalkidan
  </text>

  <!-- Small decorative heart flourish under name -->
  <g transform="translate(512,870)" fill="url(#textGrad)" opacity="0.4">
    <path d="M0,4 C-8,-4 -14,-12 -14,-18 C-14,-24 -8,-28 -2,-24 C0,-22 0,-22 0,-22 C0,-22 0,-22 2,-24 C8,-28 14,-24 14,-18 C14,-12 8,-4 0,4 Z"/>
  </g>
</svg>