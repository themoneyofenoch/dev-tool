    <!-- Ethiopian cross pattern inside heart -->
    <g opacity="0.14" fill="none" stroke="#FFF" stroke-width="1.1">
      <path d="M0,-90 L9,-99 L18,-90 L9,-81 Z"/>
      <path d="M0,-90 L-9,-99 L-18,-90 L-9,-81 Z"/>
      <path d="M0,90 L9,99 L18,90 L9,81 Z"/>
      <path d="M0,90 L-9,99 L-18,90 L-9,81 Z"/>
      <path d="M-90,0 L-99,9 L-90,18 L-81,9 Z"/>
      <path d="M-90,0 L-99,-9 L-90,-18 L-81,-9 Z"/>
      <path d="M90,0 L99,9 L90,18 L81,9 Z"/>
      <path d="M90,0 L99,-9 L90,-18 L81,-9 Z"/>
      <path d="M-22,-34 L0,-90 L22,-34"/>
      <path d="M-22,34 L0,90 L22,34"/>
      <path d="M-34,-22 L-90,0 L-34,22"/>
      <path d="M34,-22 L90,0 L34,22"/>
      <path d="M-68,-68 L-90,-90"/>
      <path d="M68,-68 L90,-90"/>
      <path d="M-68,68 L-90,90"/>
      <path d="M68,68 L90,90"/>
      <circle cx="0" cy="0" r="45" stroke-width="0.9"/>
      <circle cx="0" cy="0" r="78" stroke-width="0.7"/>
    </g>

    <!-- Weaving diamonds -->
    <g opacity="0.11" fill="none" stroke="#FFF" stroke-width="0.9">
      <path d="M-200,-140 L-178,-162 L-156,-140 L-178,-118 Z"/>
      <path d="M-110,-170 L-88,-192 L-66,-170 L-88,-148 Z"/>
      <path d="M66,-170 L88,-192 L110,-170 L88,-148 Z"/>
      <path d="M156,-140 L178,-162 L200,-140 L178,-118 Z"/>
      <path d="M-240,-56 L-218,-78 L-196,-56 L-218,-34 Z"/>
      <path d="M-88,-34 L-66,-56 L-44,-34 L-66,-12 Z"/>
      <path d="M44,-34 L66,-56 L88,-34 L66,-12 Z"/>
      <path d="M196,-56 L218,-78 L240,-56 L218,-34 Z"/>
      <path d="M-156,34 L-134,12 L-112,34 L-134,56 Z"/>
      <path d="M112,34 L134,12 L156,34 L134,56 Z"/>
      <path d="M-200,90 L-178,68 L-156,90 L-178,112 Z"/>
      <path d="M156,90 L178,68 L200,90 L178,112 Z"/>
    </g>

    <path d="M-110,-70 C-65,-200 65,-200 110,-70 C135,-22 110,22 55,45 C0,68 -55,68 -110,45 C-220,22 -240,-22 -220,-70 C-200,-110 -155,-130 -110,-70 Z"
      fill="white" opacity="0.07"/>
  </g>
