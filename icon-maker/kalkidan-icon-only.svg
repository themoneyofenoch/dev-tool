<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9A825"/>
      <stop offset="35%" stop-color="#F57C00"/>
      <stop offset="65%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="50%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </radialGradient>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="180" ry="180" fill="url(#bgGrad)"/>

  <!-- Ethiopian cross geometry border ring -->
  <g opacity="0.10" fill="none" stroke="#D84315" stroke-width="1.5">
    <g transform="translate(512,512)">
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(0)"/>
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(45)"/>
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(90)"/>
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(135)"/>
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(180)"/>
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(225)"/>
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(270)"/>
      <path d="M0,-430 L14,-440 L0,-450 L-14,-440 Z" transform="rotate(315)"/>
    </g>
  </g>

  <g opacity="0.15" fill="none" stroke="#BF360C" stroke-width="1.2">
    <g transform="translate(512,512)">
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(0)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(22.5)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(45)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(67.5)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(90)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(112.5)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(135)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(157.5)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(180)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(202.5)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(225)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(247.5)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(270)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(292.5)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(315)"/>
      <path d="M0,-370 L10,-385 L0,-400 L-10,-385 Z" transform="rotate(337.5)"/>
    </g>
  </g>

  <!-- MAIN HEART - larger since no text -->
  <g transform="translate(512,440)">
    <path d="M0,180 C-240,0 -400,-180 -300,-310 C-230,-400 -120,-400 -50,-310 C0,-240 0,-120 0,-120 C0,-120 0,-240 50,-310 C120,-400 230,-400 300,-310 C400,-180 240,0 0,180 Z"
