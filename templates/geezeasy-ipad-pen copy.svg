<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="ipadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3366"/>
      <stop offset="50%" stop-color="#CC33FF"/>
      <stop offset="100%" stop-color="#33CCFF"/>
    </linearGradient>
    <linearGradient id="geezGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F5D0FE"/>
      <stop offset="100%" stop-color="#C4F0FF"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3366"/>
      <stop offset="50%" stop-color="#CC33FF"/>
      <stop offset="100%" stop-color="#33CCFF"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="185" fill="#FFFFFF"/>

  <g transform="translate(512, 480)">
    <!-- LEFT iPad — tilted left, behind -->
    <g transform="rotate(18) translate(-200, -20)">
      <rect x="-150" y="-200" width="300" height="400" rx="28" fill="url(#ipadGrad)" opacity="0.35"/>
    </g>

    <!-- RIGHT iPad — tilted right, behind -->
    <g transform="rotate(-18) translate(200, -20)">
      <rect x="-150" y="-200" width="300" height="400" rx="28" fill="url(#ipadGrad)" opacity="0.35"/>
    </g>

    <!-- CENTER iPad — straight, front, full -->
    <rect x="-200" y="-240" width="400" height="480" rx="32" fill="url(#ipadGrad)"/>

    <!-- Center screen -->
    <rect x="-170" y="-210" width="340" height="410" rx="12" fill="#0F172A"/>
    <rect x="-170" y="-210" width="340" height="140" rx="12" fill="url(#ipadGrad)" opacity="0.12"/>

    <!-- Home button center -->
    <circle cx="0" cy="195" r="14" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.9"/>
    <rect x="-3.5" y="192" width="7" height="7" rx="2" fill="#FFFFFF" opacity="0.9"/>

    <!-- Camera center -->
    <circle cx="0" cy="-220" r="5" fill="#FFFFFF"/>
    <circle cx="0" cy="-220" r="2.5" fill="#0F172A"/>

    <!-- Pen — smaller, right side -->
    <rect x="170" y="-160" width="16" height="320" rx="8" fill="#FFFFFF" opacity="0.92"/>

    <!-- Pen tip -->
    <polygon points="170,160 176,178 186,160" fill="#FFFFFF" opacity="0.92"/>
    <!-- Pen cap -->
    <circle cx="178" cy="-160" r="10" fill="#FFFFFF" opacity="0.92"/>

    <!-- ግዕዝ on center screen -->
    <text x="0" y="0" font-family="'Kefa III','Geeza Pro','Kefa','Geez',sans-serif" font-size="105" font-weight="800" fill="url(#geezGrad)" fill-opacity="0.9" text-anchor="middle" dominant-baseline="central">ግዕዝ</text>
  </g>

  <text x="512" y="935" font-family="'Inter','SF Pro Display',sans-serif" font-size="64" font-weight="800" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="3">GeezEasy</text>
</svg>
