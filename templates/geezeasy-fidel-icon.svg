<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
    <filter id="keyShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
    <!-- 8 petal gradients: Red, Yellow, Green, Cyan, Blue, Purple, Magenta, Orange -->
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B5B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52D47F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ECC71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48DBFB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00BCD4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#AF7AC5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2185B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="20" y="20" width="984" height="984" rx="200" fill="#FAFAFA" filter="url(#shadow)"/>

  <!-- 8 petals radiating from center (45° each) -->
  <g transform="translate(512, 512) rotate(0)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p1)" opacity="0.9"/>
  </g>
  <g transform="translate(512, 512) rotate(45)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p2)" opacity="0.9"/>
  </g>
  <g transform="translate(512, 512) rotate(90)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p3)" opacity="0.9"/>
  </g>
  <g transform="translate(512, 512) rotate(135)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p4)" opacity="0.9"/>
  </g>
  <g transform="translate(512, 512) rotate(180)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p5)" opacity="0.9"/>
  </g>
  <g transform="translate(512, 512) rotate(225)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p6)" opacity="0.9"/>
  </g>
  <g transform="translate(512, 512) rotate(270)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p7)" opacity="0.9"/>
  </g>
  <g transform="translate(512, 512) rotate(315)">
    <ellipse cx="0" cy="-228" rx="86" ry="140" fill="url(#p8)" opacity="0.9"/>
  </g>

  <!-- Center white circle -->
  <circle cx="512" cy="512" r="176" fill="white" filter="url(#keyShadow)"/>

  <!-- Keyboard key shape -->
  <rect x="376" y="376" width="272" height="272" rx="36" fill="#FAFAFA" stroke="#2D2D2D" stroke-width="7"/>

  <!-- Key depth (bottom edge 3D effect) -->
  <path d="M 384 632 L 640 632 L 644 640 Q 644 646 640 648 L 384 648 Q 380 646 380 640 Z" fill="#2D2D2D"/>

  <!-- Ge'ez text ፊደል -->
  <text x="512" y="554" font-family="Arial, sans-serif" font-size="130" font-weight="bold" text-anchor="middle" fill="#1A1A1A" letter-spacing="-4">ፊደል</text>

  <!-- Golden sparkles - top-left -->
  <g opacity="0.85">
    <circle cx="108" cy="108" r="10" fill="#FFD700"/>
    <circle cx="132" cy="84" r="7" fill="#FFD700"/>
    <circle cx="84" cy="132" r="7" fill="#FFD700"/>
    <circle cx="108" cy="108" r="4" fill="#FFF9C4"/>
  </g>

  <!-- Golden sparkles - bottom-right -->
  <g opacity="0.85">
    <circle cx="916" cy="916" r="10" fill="#FFD700"/>
    <circle cx="940" cy="892" r="7" fill="#FFD700"/>
    <circle cx="892" cy="940" r="7" fill="#FFD700"/>
    <circle cx="916" cy="916" r="4" fill="#FFF9C4"/>
  </g>

  <!-- Golden sparkles - top-right -->
  <g opacity="0.6">
    <circle cx="916" cy="108" r="6" fill="#FFD700"/>
    <circle cx="940" cy="132" r="4" fill="#FFD700"/>
    <circle cx="892" cy="84" r="4" fill="#FFD700"/>
  </g>

  <!-- Golden sparkles - bottom-left -->
  <g opacity="0.6">
    <circle cx="108" cy="916" r="6" fill="#FFD700"/>
    <circle cx="84" cy="892" r="4" fill="#FFD700"/>
    <circle cx="132" cy="940" r="4" fill="#FFD700"/>
  </g>
</svg>
