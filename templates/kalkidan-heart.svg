<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF416C"/>
      <stop offset="50%" stop-color="#FF6B4A"/>
      <stop offset="100%" stop-color="#FF9A3C"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Large white heart -->
  <g transform="translate(512, 410) scale(1.8)">
    <path d="M 0,-30 C 0,-30 -120,-120 -120,-200 C -120,-280 -60,-320 0,-260 C 60,-320 120,-280 120,-200 C 120,-120 0,-30 0,-30 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M -40,-200 C -40,-240 -80,-260 -100,-240 C -120,-220 -120,-180 -80,-140 C -40,-100 0,-60 0,-40" fill="none" stroke="#FFD0D4" stroke-width="2" opacity="0.15"/>
  </g>

  <!-- KALKIDAN — Vogue serif, white, centered -->
  <text x="512" y="890" text-anchor="middle" font-family="'Didot', 'Bodoni 72', 'Georgia', serif" font-weight="700" font-size="120" letter-spacing="12" fill="#ffffff">
    KALKIDAN
  </text>

  <!-- Heart tittle above the "I" -->
  <!-- "KALKIDAN" centered at 512, "I" is the 5th char, roughly at x=545 in serif font -->
  <g transform="translate(545, 738)">
    <path d="M 0,6 C 0,6 -11,-6 -11,-16 C -11,-26 -5,-30 0,-22 C 5,-30 11,-26 11,-16 C 11,-6 0,6 0,6 Z" fill="#ffffff"/>
  </g>
</svg>